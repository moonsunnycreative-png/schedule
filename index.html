<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 빡센 주간 일정</title>
<link href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@300;500;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0d0f; --surface:#16161a; --border:#2a2a35;
    --accent1:#ff6b35; --accent2:#f7c59f; --accent3:#4ecdc4;
    --accent4:#ffe66d; --accent5:#a29bfe; --text:#f0ede8; --muted:#888;
    --slot:40px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;padding:40px 24px;}
  header{text-align:center;margin-bottom:48px;}
  header h1{font-family:'Gmarket Sans',sans-serif;font-size:clamp(28px,5vw,52px);font-weight:700;letter-spacing:-1px;background:linear-gradient(135deg,var(--accent1),var(--accent4),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2;margin-bottom:8px;}
  header p{color:var(--muted);font-size:14px;letter-spacing:2px;text-transform:uppercase;}
  .legend{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:40px;}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);}
  .legend-dot{width:10px;height:10px;border-radius:50%;}

  .calendar-wrap{max-width:1150px;margin:0 auto;overflow-x:auto;}
  .calendar{display:grid;grid-template-columns:52px repeat(6,minmax(130px,1fr));min-width:870px;}

  /* 헤더 */
  .col-header{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 6px;text-align:center;position:sticky;top:0;z-index:20;margin:0 1px 6px;}
  .col-header .day-name{font-family:'Gmarket Sans',sans-serif;font-size:15px;font-weight:700;margin-bottom:2px;}
  .col-header .day-sub{font-size:10px;color:var(--muted);}
  .mon .day-name{color:var(--accent1);} .tue .day-name{color:var(--accent2);}
  .wed .day-name{color:var(--accent3);} .thu .day-name{color:var(--accent4);}
  .fri .day-name{color:var(--accent5);} .sat .day-name{color:#fd79a8;}
  .today-badge{display:inline-block;background:var(--accent4);color:#000;font-size:9px;font-weight:700;padding:2px 6px;border-radius:20px;margin-top:3px;font-family:'Gmarket Sans',sans-serif;}

  /* 시간 컬럼 */
  .time-col{position:relative;}
  .time-label{height:var(--slot);display:flex;align-items:flex-start;justify-content:flex-end;padding-right:8px;padding-top:3px;font-size:10px;color:var(--muted);font-family:'Gmarket Sans',sans-serif;white-space:nowrap;}

  /* 요일 컬럼 */
  .day-col{position:relative;background-image:repeating-linear-gradient(to bottom,transparent 0px,transparent calc(var(--slot) - 1px),#1e1e28 calc(var(--slot) - 1px),#1e1e28 var(--slot));}

  /* 블록 */
  .block{position:absolute;left:2px;right:2px;border-radius:7px;padding:5px 7px;font-size:11px;line-height:1.35;border:1px solid transparent;cursor:pointer;overflow:hidden;transition:transform 0.12s,box-shadow 0.12s;z-index:2;}
  .block:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,0.5);z-index:10;overflow:visible;}
  .block.done{opacity:0.35;filter:grayscale(0.6);}
  .block.done::after{content:'✅';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:18px;}
  .block.done .block-title{text-decoration:line-through;}
  .block-emoji{font-size:12px;display:block;margin-bottom:1px;}
  .block-title{font-weight:700;font-size:10px;word-break:keep-all;}
  .block-time{font-size:9px;opacity:0.65;font-family:'Gmarket Sans',sans-serif;}
  .block-detail{font-size:9px;opacity:0.8;margin-top:1px;}

  .b-wake{background:#1a1a2e;border-color:#333355;color:#aaa;}
  .b-exercise{background:linear-gradient(135deg,#1a3a2a,#0d2a1a);border-color:#2d6a4f;color:#74c69d;}
  .b-shower{background:#141424;border-color:#252540;color:#888;}
  .b-eng-review{background:linear-gradient(135deg,#2d1a3a,#1a0d2a);border-color:#6a2d9a;color:#c77dff;}
  .b-coursera{background:linear-gradient(135deg,#1a2a3a,#0d1a2a);border-color:#2d6a9a;color:#48cae4;}
  .b-lunch{background:#1a1a14;border-color:#3a3a20;color:#d4a017;}
  .b-move{background:#141414;border-color:#2a2a2a;color:#666;}
  .b-create{background:linear-gradient(135deg,#3a1a1a,#2a0d0d);border-color:#9a2d2d;color:#ff6b6b;}
  .b-ai{background:linear-gradient(135deg,#1a1a3a,#0d0d2a);border-color:#2d2d9a;color:#6b8cff;}
  .b-cafe-end{background:#141414;border-color:#2a2a2a;color:#666;}
  .b-eng-speak{background:linear-gradient(135deg,#3a2a1a,#2a1a0d);border-color:#9a6a2d;color:#ffb347;}
  .b-eng-class{background:linear-gradient(135deg,#3a1a2a,#2a0d1a);border-color:#9a2d6a;color:#ff6bb5;}
  .b-free{background:#111115;border-color:#222228;color:#555;}
  .b-instatoon{background:linear-gradient(135deg,#2a1a3a,#1a0d2a);border-color:#7a3d9a;color:#da77ff;}

  .progress-wrap{max-width:1150px;margin:32px auto 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;}
  .progress-wrap .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .progress-track{background:#222;border-radius:20px;height:8px;overflow:hidden;}
  .progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#ff6b35,#ffe66d,#4ecdc4);border-radius:20px;transition:width 0.4s ease;}
  .summary-bar{max-width:1150px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;}
  .summary-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;}
  .s-emoji{font-size:24px;margin-bottom:6px;} .s-label{font-size:11px;color:var(--muted);margin-bottom:4px;} .s-value{font-family:'Gmarket Sans';font-size:20px;font-weight:700;}
  .btn-row{text-align:center;margin-top:32px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
  .btn{padding:10px 24px;border-radius:20px;cursor:pointer;font-family:'Noto Sans KR';font-size:13px;border:1px solid;}
  .btn-reset{background:#1a1a1a;border-color:#333;color:#666;}
  .btn-edit{background:#1a1a2e;border-color:#4444aa;color:#a29bfe;}
</style>
</head>
<body>

<header>
  <h1>🔥 나의 빡센 주간 일정</h1>
  <p>Monday – Saturday · 08:00 – 23:00</p>
</header>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#74c69d"></div>운동</div>
  <div class="legend-item"><div class="legend-dot" style="background:#48cae4"></div>Coursera</div>
  <div class="legend-item"><div class="legend-dot" style="background:#c77dff"></div>영어복습</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ffb347"></div>영어말하기</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ff6bb5"></div>영어회화수업(월)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ff6b6b"></div>자유창작</div>
  <div class="legend-item"><div class="legend-dot" style="background:#6b8cff"></div>AI창작</div>
</div>

<div class="calendar-wrap">
<div class="calendar" id="calendar">
  <div></div>
  <div class="col-header mon" id="day-mon"><div class="day-name">월</div><div class="day-sub">MON</div></div>
  <div class="col-header tue" id="day-tue"><div class="day-name">화</div><div class="day-sub">TUE</div></div>
  <div class="col-header wed" id="day-wed"><div class="day-name">수</div><div class="day-sub">WED</div></div>
  <div class="col-header thu" id="day-thu"><div class="day-name">목</div><div class="day-sub">THU</div></div>
  <div class="col-header fri" id="day-fri"><div class="day-name">금</div><div class="day-sub">FRI</div></div>
  <div class="col-header sat" id="day-sat"><div class="day-name">토</div><div class="day-sub">SAT</div></div>
  <div class="time-col" id="time-col"></div>
  <div class="day-col" id="col-mon"></div>
  <div class="day-col" id="col-tue"></div>
  <div class="day-col" id="col-wed"></div>
  <div class="day-col" id="col-thu"></div>
  <div class="day-col" id="col-fri"></div>
  <div class="day-col" id="col-sat"></div>
</div>
</div>

<div class="progress-wrap">
  <div class="top">
    <span id="progress-text" style="font-family:'Gmarket Sans';font-size:13px;color:#aaa;">오늘 진행률 0%</span>
    <span style="font-size:11px;color:#555;">블록 클릭 → 완료 체크!</span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
</div>

<div class="summary-bar">
  <div class="summary-card"><div class="s-emoji">📚</div><div class="s-label">Coursera / 주</div><div class="s-value" style="color:#48cae4">9h</div></div>
  <div class="summary-card"><div class="s-emoji">🗣️</div><div class="s-label">영어 / 주</div><div class="s-value" style="color:#ffb347">8.5h</div></div>
  <div class="summary-card"><div class="s-emoji">🎨✍️</div><div class="s-label">자유창작 / 주</div><div class="s-value" style="color:#ff6b6b">12h</div></div>
  <div class="summary-card"><div class="s-emoji">🤖</div><div class="s-label">AI창작 / 주</div><div class="s-value" style="color:#6b8cff">9h</div></div>
  <div class="summary-card"><div class="s-emoji">🏃</div><div class="s-label">운동 / 주</div><div class="s-value" style="color:#74c69d">4h</div></div>
</div>

<div class="btn-row">
  <button class="btn btn-reset" onclick="resetAll()">🔄 체크 초기화</button>
  <button class="btn btn-edit" id="edit-btn" onclick="toggleEditMode()">✏️ 편집 모드</button>
</div>

<script>
const SLOT = 40;   // 30분 = 40px
const START = 8;   // 08:00
const END = 23;    // 23:00
const TOTAL_SLOTS = (END - START) * 2; // 30분 단위 슬롯 수

function timeToY(t) {
  const [h,m] = t.split(':').map(Number);
  return ((h - START) * 60 + m) / 30 * SLOT;
}
function durationPx(s, e) {
  const [sh,sm] = s.split(':').map(Number);
  const [eh,em] = e.split(':').map(Number);
  return Math.max(((eh*60+em)-(sh*60+sm)) / 30 * SLOT - 2, 18);
}

// 공통 블록
const common = [
  {emoji:'🌅',title:'기상 루틴',  start:'08:00',end:'08:30',cls:'b-wake'},
  {emoji:'🏃',title:'아침 운동',  start:'08:30',end:'09:10',cls:'b-exercise'},
  {emoji:'🚿',title:'샤워&준비',  start:'09:10',end:'09:40',cls:'b-shower'},
  {emoji:'📖',title:'영어 복습',  start:'09:40',end:'10:10',cls:'b-eng-review'},
  {emoji:'📚',title:'Coursera',   start:'10:10',end:'11:40',cls:'b-coursera',detail:'1.5h 몰아듣기'},
  {emoji:'🍽️',title:'점심 식사', start:'11:40',end:'13:00',cls:'b-lunch'},
  {emoji:'🚶',title:'카페 이동',  start:'13:00',end:'13:30',cls:'b-move'},
  {emoji:'🤖',title:'AI 창작',    start:'15:30',end:'17:00',cls:'b-ai',detail:'영상 제작'},
  {emoji:'🏠',title:'귀가·저녁', start:'17:00',end:'18:30',cls:'b-cafe-end'},
  {emoji:'🗣️',title:'영어 말하기',start:'19:00',end:'20:00',cls:'b-eng-speak'},
  {emoji:'🌙',title:'자유시간',   start:'20:00',end:'23:00',cls:'b-free'},
];

const schedule = {
  mon: [...common.filter(b=>b.cls!=='b-eng-speak'),
    {emoji:'🎨',title:'인스타툰',start:'13:30',end:'15:30',cls:'b-instatoon',detail:'자유창작'},
    {emoji:'🍺',title:'영어 회화 수업',start:'19:00',end:'20:00',cls:'b-eng-class'},
  ],
  tue: [...common,{emoji:'✍️',title:'시나리오',start:'13:30',end:'15:30',cls:'b-create',detail:'이야기 만들기'}],
  wed: [...common,{emoji:'🎨',title:'인스타툰',start:'13:30',end:'15:30',cls:'b-instatoon',detail:'자유창작'}],
  thu: [...common,{emoji:'✍️',title:'시나리오',start:'13:30',end:'15:30',cls:'b-create',detail:'이야기 만들기'}],
  fri: [...common,{emoji:'🎨',title:'인스타툰',start:'13:30',end:'15:30',cls:'b-instatoon',detail:'자유창작'}],
  sat: [...common,{emoji:'✍️',title:'시나리오',start:'13:30',end:'15:30',cls:'b-create',detail:'이야기 만들기'}],
};

// 시간 라벨 생성 (30분 단위)
const timeCol = document.getElementById('time-col');
timeCol.style.height = (TOTAL_SLOTS * SLOT) + 'px';
for (let i = 0; i <= TOTAL_SLOTS; i++) {
  const totalMin = START*60 + i*30;
  const h = Math.floor(totalMin/60), m = totalMin%60;
  const el = document.createElement('div');
  el.className = 'time-label';
  el.textContent = String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
  timeCol.appendChild(el);
}

// 요일 컬럼 렌더링
const days = ['mon','tue','wed','thu','fri','sat'];
days.forEach(day => {
  const col = document.getElementById('col-'+day);
  col.style.height = (TOTAL_SLOTS * SLOT) + 'px';

  const saved = localStorage.getItem('sched-'+day);
  const blocks = saved ? JSON.parse(saved) : schedule[day];

  blocks.forEach((b, bi) => {
    const div = document.createElement('div');
    div.className = 'block '+b.cls;
    div.dataset.id = 'blk-'+day+'-'+bi;
    div.dataset.day = day;
    div.dataset.bi = bi;
    div.style.top = timeToY(b.start)+'px';
    div.style.height = durationPx(b.start, b.end)+'px';
    div.innerHTML =
      `<span class="block-emoji">${b.emoji}</span>` +
      `<div class="block-title">${b.title}</div>` +
      `<div class="block-time">${b.start}–${b.end}</div>` +
      (b.detail ? `<div class="block-detail">${b.detail}</div>` : '');

    if (localStorage.getItem(div.dataset.id)==='done') div.classList.add('done');

    div.addEventListener('click', () => {
      if (editMode) return;
      div.classList.toggle('done');
      localStorage.setItem(div.dataset.id, div.classList.contains('done')?'done':'');
      updateProgress();
    });
    col.appendChild(div);
  });
});

// TODAY 감지
const dayMap={1:'mon',2:'tue',3:'wed',4:'thu',5:'fri',6:'sat'};
const todayKey = dayMap[new Date().getDay()];
if (todayKey) {
  const hdr = document.getElementById('day-'+todayKey);
  if (hdr) {
    hdr.style.border = '1px solid var(--accent4)';
    const b = document.createElement('div');
    b.className = 'today-badge';
    b.textContent = todayKey==='mon' ? '🍺 회화수업 · TODAY' : 'TODAY';
    hdr.appendChild(b);
  }
}

function updateProgress() {
  const all = document.querySelectorAll('.block').length;
  const done = document.querySelectorAll('.block.done').length;
  const pct = all ? Math.round(done/all*100) : 0;
  document.getElementById('progress-text').textContent = `오늘 진행률 ${pct}% (${done}/${all})`;
  document.getElementById('progress-fill').style.width = pct+'%';
}

function resetAll() {
  document.querySelectorAll('.block').forEach(b => {
    b.classList.remove('done');
    localStorage.removeItem(b.dataset.id);
  });
  updateProgress();
}

let editMode = false;
function toggleEditMode() {
  editMode = !editMode;
  const btn = document.getElementById('edit-btn');
  if (editMode) {
    btn.textContent='💾 저장하기';
    btn.style.cssText='background:#1a3a1a;border-color:#4a9a4a;color:#74c69d;padding:10px 24px;border-radius:20px;cursor:pointer;font-family:Noto Sans KR;font-size:13px;border-width:1px;border-style:solid;';
    document.querySelectorAll('.block').forEach(block => {
      block.style.cursor='text'; block.style.overflow='visible'; block.style.zIndex='15';
      block.querySelectorAll('.block-emoji,.block-title,.block-time,.block-detail')
        .forEach(el => { el.contentEditable='true'; });
    });
  } else {
    btn.textContent='✏️ 편집 모드';
    btn.style.cssText='background:#1a1a2e;border-color:#4444aa;color:#a29bfe;padding:10px 24px;border-radius:20px;cursor:pointer;font-family:Noto Sans KR;font-size:13px;border-width:1px;border-style:solid;';
    days.forEach(day => {
      const col = document.getElementById('col-'+day);
      const updated = [];
      col.querySelectorAll('.block').forEach(block => {
        const emojiEl  = block.querySelector('.block-emoji');
        const titleEl  = block.querySelector('.block-title');
        const timeEl   = block.querySelector('.block-time');
        const detailEl = block.querySelector('.block-detail');
        const timeText = timeEl ? timeEl.innerText : '';
        const parts = timeText.split('–');
        const s = parts[0]?.trim()||'', e = parts[1]?.trim()||'';
        // 유효한 시간이면 위치·높이 재계산
        if (/^\d{2}:\d{2}$/.test(s) && /^\d{2}:\d{2}$/.test(e)) {
          block.style.top    = timeToY(s)+'px';
          block.style.height = durationPx(s,e)+'px';
        }
        block.style.cursor='pointer'; block.style.overflow='hidden'; block.style.zIndex='2';
        block.querySelectorAll('.block-emoji,.block-title,.block-time,.block-detail')
          .forEach(el => { el.contentEditable='false'; });
        updated.push({
          emoji : emojiEl  ? emojiEl.innerText  : '',
          title : titleEl  ? titleEl.innerText  : '',
          start : s, end: e,
          cls   : [...block.classList].find(c=>c.startsWith('b-'))||'',
          detail: detailEl ? detailEl.innerText : '',
        });
      });
      localStorage.setItem('sched-'+day, JSON.stringify(updated));
    });
    alert('✅ 저장됐어요! 시간 수정하면 블록 크기도 자동으로 맞춰줘요 😊');
    updateProgress();
  }
}

updateProgress();
</script>
</body>
</html>
